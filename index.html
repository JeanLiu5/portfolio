<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>摄影作品 · Jean</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            overflow-x: hidden;
            line-height: 1.6;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* ===== Loading Screen ===== */
        #loader {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: #0a0a0a;
            transition: opacity .8s ease, visibility .8s ease;
        }
        #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-ring {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid #222;
            border-top-color: #f0f0f0;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Navigation ===== */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 0 40px; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10,10,10,.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,.06);
            transition: transform .4s ease;
        }
        nav.hidden-nav { transform: translateY(-100%); }
        .logo {
            font-size: 18px; font-weight: 600; letter-spacing: -.5px;
            cursor: default; user-select: none;
        }
        .logo span { color: #666; font-weight: 300; }
        .nav-links { display: flex; gap: 8px; align-items: center; }
        .nav-links a {
            color: #888; text-decoration: none; font-size: 13px; font-weight: 500;
            padding: 6px 16px; border-radius: 20px;
            transition: all .3s ease; letter-spacing: .3px; cursor: pointer;
        }
        .nav-links a:hover { color: #f0f0f0; background: rgba(255,255,255,.06); }
        .nav-links a.active { color: #0a0a0a; background: #f0f0f0; }

        /* ===== Hero Section ===== */
        .hero {
            position: relative; height: 100vh; min-height: 600px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(120,80,200,.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(200,120,50,.1) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(50,150,200,.08) 0%, transparent 50%);
        }
        .hero-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .hero-content { text-align: center; z-index: 1; padding: 20px; }
        .hero-badge {
            display: inline-block;
            padding: 6px 20px; border-radius: 20px;
            font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
            border: 1px solid rgba(255,255,255,.1);
            background: rgba(255,255,255,.04);
            color: #aaa; margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .hero h1 {
            font-size: clamp(48px, 10vw, 120px); font-weight: 700;
            line-height: 1.05; letter-spacing: -3px;
            background: linear-gradient(135deg, #f0f0f0 0%, #888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 18px; color: #888; max-width: 520px; margin: 0 auto 40px;
            font-weight: 300; letter-spacing: .5px;
        }
        .hero-cta {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 36px; border-radius: 30px;
            background: #f0f0f0; color: #0a0a0a;
            text-decoration: none; font-size: 14px; font-weight: 600;
            transition: all .3s ease; letter-spacing: .5px;
        }
        .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(240,240,240,.15); }
        .scroll-indicator {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            color: #555; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            animation: float 2s ease-in-out infinite;
        }
        .scroll-indicator .line {
            width: 1px; height: 40px; background: linear-gradient(to bottom, #555, transparent);
        }
        @keyframes float { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-8px); } }

        /* ===== Section Common ===== */
        section { padding: 100px 40px; }
        .section-header {
            text-align: center; margin-bottom: 60px; max-width: 700px; margin-inline: auto;
        }
        .section-tag {
            display: inline-block; font-size: 11px; font-weight: 600;
            letter-spacing: 3px; text-transform: uppercase; color: #666;
            margin-bottom: 16px;
        }
        .section-header h2 {
            font-size: clamp(32px, 5vw, 48px); font-weight: 600;
            letter-spacing: -1.5px; line-height: 1.15;
            background: linear-gradient(135deg, #f0f0f0 60%, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .section-header p {
            color: #777; font-size: 15px; margin-top: 16px; font-weight: 300;
        }

        /* ===== Category Filter ===== */
        .filter-bar {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
            margin-bottom: 50px;
        }
        .filter-btn {
            padding: 8px 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,.08);
            background: transparent; color: #888; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all .3s ease;
            font-family: inherit; letter-spacing: .3px;
        }
        .filter-btn:hover { color: #f0f0f0; border-color: rgba(255,255,255,.2); }
        .filter-btn.active { color: #0a0a0a; background: #f0f0f0; border-color: #f0f0f0; }

        /* ===== Gallery ===== */
        .gallery {
            column-count: 3; column-gap: 20px;
            max-width: 1400px; margin: 0 auto;
        }
        .gallery-item {
            break-inside: avoid; margin-bottom: 20px;
            position: relative; border-radius: 12px; overflow: hidden;
            cursor: pointer; background: #141414;
            transition: transform .4s ease, opacity .4s ease;
        }
        .gallery-item.hidden { display: none; }
        .gallery-item img {
            width: 100%; display: block;
            transition: transform .6s ease;
        }
        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 50%);
            opacity: 0; transition: opacity .4s ease;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 24px;
        }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        .gallery-overlay h3 {
            font-size: 16px; font-weight: 600; margin-bottom: 4px;
        }
        .gallery-overlay p {
            font-size: 12px; color: #aaa; font-weight: 300;
        }
        .gallery-empty {
            grid-column: 1 / -1; text-align: center; padding: 80px 20px;
            color: #555; font-size: 15px;
        }
        .gallery-empty span { font-size: 48px; display: block; margin-bottom: 20px; }

        /* ===== Lightbox ===== */
        .lightbox {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,.92);
            backdrop-filter: blur(20px);
            opacity: 0; visibility: hidden; transition: all .4s ease;
        }
        .lightbox.open { opacity: 1; visibility: visible; }
        .lightbox-close {
            position: absolute; top: 24px; right: 24px;
            width: 44px; height: 44px; border-radius: 50%;
            border: none; background: rgba(255,255,255,.08);
            color: #fff; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .3s ease; z-index: 2;
        }
        .lightbox-close:hover { background: rgba(255,255,255,.15); }
        .lightbox-content {
            max-width: 90vw; max-height: 85vh; position: relative;
            transform: scale(.9); transition: transform .4s ease;
        }
        .lightbox.open .lightbox-content { transform: scale(1); }
        .lightbox-content img {
            max-width: 100%; max-height: 85vh; border-radius: 8px;
            box-shadow: 0 20px 80px rgba(0,0,0,.6);
        }
        .lightbox-info {
            position: absolute; bottom: -50px; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            color: #aaa; font-size: 14px;
        }
        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 48px; height: 48px; border-radius: 50%;
            border: none; background: rgba(255,255,255,.06);
            color: #fff; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .3s ease; z-index: 2;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,.15); }
        .lightbox-nav.prev { left: 24px; }
        .lightbox-nav.next { right: 24px; }

        /* ===== About Section ===== */
        .about-wrap {
            max-width: 900px; margin: 0 auto;
            text-align: center;
        }
        .about-wrap .section-header { margin-bottom: 50px; }
        .about-bio {
            font-size: 16px; color: #999; line-height: 1.9;
            max-width: 600px; margin: 0 auto 50px;
            font-weight: 300;
        }
        .contact-cards {
            display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
        }
        .contact-card {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 24px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,.06);
            background: rgba(255,255,255,.02);
            transition: all .3s ease;
            min-width: 200px;
        }
        .contact-card:hover {
            border-color: rgba(255,255,255,.15);
            background: rgba(255,255,255,.04);
            transform: translateY(-2px);
        }
        .contact-card .icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            background: rgba(255,255,255,.04);
            flex-shrink: 0;
        }
        .contact-card .info {
            text-align: left;
        }
        .contact-card .info .label {
            font-size: 11px; color: #666; font-weight: 500;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .contact-card .info .value {
            font-size: 14px; color: #ddd; font-weight: 400;
            margin-top: 2px; word-break: break-all;
        }
        .contact-card .info .value a {
            color: #ddd; text-decoration: none;
        }
        .contact-card .info .value a:hover { color: #fff; }

        /* ===== Footer ===== */
        footer {
            text-align: center; padding: 30px 40px;
            color: #444; font-size: 12px; font-weight: 300;
            border-top: 1px solid rgba(255,255,255,.04);
        }

        /* ===== Responsive ===== */
        @media (max-width: 1024px) { .gallery { column-count: 2; } }
        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            section { padding: 60px 20px; }
            .hero h1 { font-size: clamp(36px, 12vw, 60px); letter-spacing: -2px; }
            .gallery { column-count: 2; column-gap: 12px; }
            .gallery-item { margin-bottom: 12px; }
            .lightbox-nav { width: 36px; height: 36px; font-size: 14px; }
            .lightbox-nav.prev { left: 8px; }
            .lightbox-nav.next { right: 8px; }
            .lightbox-info { flex-direction: column; gap: 4px; bottom: -60px; }
            .logo { font-size: 16px; }
            .contact-card { min-width: 160px; padding: 12px 18px; }
        }
        @media (max-width: 480px) {
            .gallery { column-count: 1; }
            .nav-links a { padding: 4px 12px; font-size: 12px; }
            .hero-cta { padding: 12px 28px; font-size: 13px; }
            .filter-btn { padding: 6px 16px; font-size: 12px; }
        }

        /* ===== Reveal Animation ===== */
        .reveal {
            opacity: 0; transform: translateY(30px);
            transition: opacity .6s ease, transform .6s ease;
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .reveal-delay-1 { transition-delay: .1s; }
        .reveal-delay-2 { transition-delay: .2s; }
        .reveal-delay-3 { transition-delay: .3s; }

        /* ===== Transition for filter ===== */
        .gallery-item {
            transition: opacity .4s ease, transform .4s ease;
        }
    </style>
</head>
<body>

    <!-- ===== Loading Screen ===== -->

        <div class="loader-ring"></div>
    </div>

    <!-- ===== Navigation ===== -->

    <!-- ===== Lightbox ===== -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <button class="lightbox-nav prev" id="lightboxPrev">&#8592;</button>
        <button class="lightbox-nav next" id="lightboxNext">&#8594;</button>
        <div class="lightbox-content">
            <img id="lightboxImg" src="" alt="" />
            <div class="lightbox-info">
                <span id="lightboxTitle"></span>

    <script>
        // ===== 分类字典 =====
        const categoryNames = {
            fengjing: '风光',
            portrait: '人像',
            animal: '动物',
            'still-life': '静物',
            street: '街拍'
        };
        // 文件夹路径名（英文），与实际目录对应
        const folderNames = {
            fengjing: 'fengjing',
            portrait: 'portrait',
            animal: 'animal',
            'still-life': 'still-life',
            street: 'street'
        };

        // ===== 照片数据 — 从 images/ 子目录自动收集 =====
        // 分类文件夹：images/风光/   images/人像/   images/动物/   images/静物/   images/街拍/
        // 每个 item: { id, cat, title, desc, file }
        // file 使用相对于 images/<cat>/ 的相对路径

        const imageExtensions = ['jpg', 'jpeg', 'png', 'webp', 'avif', 'heic'];

        // ===== 占位图生成函数 =====
        function generatePlaceholder(color, title, h) {
            const lighten = (hex, amt = 25) => {
                const r = Math.min(255, parseInt(hex.slice(1,3), 16) + amt);
                const g = Math.min(255, parseInt(hex.slice(3,5), 16) + amt);
                const b = Math.min(255, parseInt(hex.slice(5,7), 16) + amt);
                return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
            };
            const c2 = lighten(color);
            return `data:image/svg+xml,${encodeURIComponent(
                `<svg xmlns="http://www.w3.org/2000/svg" width="600" height="${h}" viewBox="0 0 600 ${h}">
                    <defs>
                        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="${color}"/>
                            <stop offset="100%" stop-color="${c2}"/>
                        </linearGradient>
                    </defs>
                    <rect width="600" height="${h}" fill="url(#g)"/>
                    <!-- Decorative -->
                    <circle cx="${Math.round(Math.random()*400+50)}" cy="${Math.round(Math.random()*h*0.6+h*0.1)}" r="${Math.round(Math.random()*40+10)}" fill="rgba(255,255,255,0.04)"/>
                    <circle cx="${Math.round(Math.random()*400+100)}" cy="${Math.round(Math.random()*h*0.5+h*0.2)}" r="${Math.round(Math.random()*60+20)}" fill="rgba(255,255,255,0.02)"/>
                    <text x="300" y="${h/2}" text-anchor="middle" dominant-baseline="middle"
                          font-family="sans-serif" font-size="24" font-weight="300"
                          fill="rgba(255,255,255,0.2)" letter-spacing="3">${title}</text>
                    <text x="300" y="${h/2+32}" text-anchor="middle" dominant-baseline="middle"
                          font-family="sans-serif" font-size="11" font-weight="300"
                          fill="rgba(255,255,255,0.08)" letter-spacing="2">PHOTOGRAPHY</text>
                </svg>`
            )}`;
        }

        // 手动定义照片清单 — 先使用占位图，后续替换为真实照片
        const photoCatalog = [
            // 风光 (fengjing)
            { id: 1,  cat: 'fengjing',  color: '#1a2a1e', h: 310, title: '晨光',   desc: '清晨的第一缕光线' },
            { id: 2,  cat: 'fengjing',  color: '#16213e', h: 270, title: '山色',   desc: '远山的层次与色调' },
            { id: 3,  cat: 'fengjing',  color: '#1a2a2e', h: 340, title: '水影',   desc: '水面倒影的静谧之美' },
            { id: 4,  cat: 'fengjing',  color: '#2a2a1e', h: 290, title: '旷野',   desc: '开阔天地间的光影' },
            { id: 5,  cat: 'fengjing',  color: '#1a1a2e', h: 250, title: '暮色',   desc: '日落时分的色彩渐变' },

            // 人像 (portrait)
            { id: 6,  cat: 'portrait',  color: '#2a1a1a', h: 360, title: '凝望',   desc: '眼神中的叙事感' },
            { id: 7,  cat: 'portrait',  color: '#1e1e2e', h: 330, title: '轮廓',   desc: '侧脸的明暗层次' },

            // 动物 (animal)
            { id: 8,  cat: 'animal',    color: '#1a2a1a', h: 290, title: '凝神',   desc: '动物眼神的专注' },
            { id: 9,  cat: 'animal',    color: '#2a2a1a', h: 320, title: '栖息的片刻', desc: '宁静的动物肖像' },
            { id: 10, cat: 'animal',    color: '#1a1e2a', h: 270, title: '午后',   desc: '慵懒的午后时光' },
            { id: 11, cat: 'animal',    color: '#2a1a2a', h: 310, title: '对视',   desc: '与镜头的交流瞬间' },

            // 静物 (still-life)
            { id: 12, cat: 'still-life',color: '#2a2a2a', h: 340, title: '静物',   desc: '光影中的质感与纹理' },
            { id: 13, cat: 'still-life',color: '#1a2a2e', h: 280, title: '细节',   desc: '微观世界的形态之美' },

            // 街拍 (street)
            { id: 14, cat: 'street',    color: '#0d0d1a', h: 300, title: '街角',   desc: '城市角落的光影故事' },
            { id: 15, cat: 'street',    color: '#12122a', h: 320, title: '行人',   desc: '街头的动态瞬间' },
            { id: 16, cat: 'street',    color: '#1a1a2a', h: 270, title: '建筑与人', desc: '人与空间的对话' },
            { id: 17, cat: 'street',    color: '#0f1a2a', h: 340, title: '光与影', desc: '城市中的几何光影' },
            { id: 18, cat: 'street',    color: '#1a1212', h: 290, title: '匆匆',   desc: '城市节奏的瞬间定格' },
        ];

        // 按分类分组计数
        const categoryCounts = {};
        photoCatalog.forEach(p => {
            categoryCounts[p.cat] = (categoryCounts[p.cat] || 0) + 1;
        });

        // ===== 渲染画廊 =====
        function renderGallery(filter = 'all') {
            const grid = document.getElementById('galleryGrid');
            const filtered = filter === 'all'
                ? photoCatalog
                : photoCatalog.filter(p => p.cat === filter);

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="gallery-empty"><span>&#128248;</span><br/>此分类暂无照片，等待上传...</div>';
                galleryItems = [];
                return;
            }

            grid.innerHTML = filtered.map(item => {
                const catLabel = categoryNames[item.cat] || item.cat;
                const imgSrc = generatePlaceholder(item.color, item.title, item.h);
                return `
                    <div class="gallery-item" data-id="${item.id}" data-cat="${item.cat}">
                        <img src="${imgSrc}" alt="${item.title}" loading="lazy" />
                        <div class="gallery-overlay">
                            <h3>${item.title}</h3>
                            <p>${item.desc} · ${catLabel}</p>
                        </div>
                    </div>
                `;
            }).join('');

            galleryItems = document.querySelectorAll('#galleryGrid .gallery-item');
        }

        // ===== 分类筛选 =====
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.filter-btn.active')?.classList.remove('active');
                btn.classList.add('active');
                renderGallery(btn.dataset.filter);
                galleryItems = document.querySelectorAll('#galleryGrid .gallery-item');
            });
        });

        // ===== 灯箱 =====
        let currentLightboxIndex = 0;
        let galleryItems = [];

        function openLightbox(index) {
            if (!galleryItems.length) return;
            currentLightboxIndex = index;
            const item = galleryItems[index];
            const img = item.querySelector('img');
            const title = item.querySelector('.gallery-overlay h3')?.textContent || '';
            const desc = item.querySelector('.gallery-overlay p')?.textContent || '';
            document.getElementById('lightboxImg').src = img?.src || '';
            document.getElementById('lightboxTitle').textContent = desc;
            document.getElementById('lightboxCounter').textContent = `${index + 1} / ${galleryItems.length}`;
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('lightboxClose').addEventListener('click', () => {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        });

        document.getElementById('lightboxPrev').addEventListener('click', () => {
            if (galleryItems.length === 0) return;
            currentLightboxIndex = (currentLightboxIndex - 1 + galleryItems.length) % galleryItems.length;
            openLightbox(currentLightboxIndex);
        });

        document.getElementById('lightboxNext').addEventListener('click', () => {
            if (galleryItems.length === 0) return;
            currentLightboxIndex = (currentLightboxIndex + 1) % galleryItems.length;
            openLightbox(currentLightboxIndex);
        });

        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('open')) return;
            if (e.key === 'Escape') { lb.classList.remove('open'); document.body.style.overflow = ''; }
            if (e.key === 'ArrowLeft') document.getElementById('lightboxPrev').click();
            if (e.key === 'ArrowRight') document.getElementById('lightboxNext').click();
        });

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('lightbox').classList.remove('open');
                document.body.style.overflow = '';
            }
        });

        document.getElementById('galleryGrid').addEventListener('click', (e) => {
            const item = e.target.closest('.gallery-item');
            if (!item) return;
            const idx = Array.from(galleryItems).indexOf(item);
            if (idx !== -1) openLightbox(idx);
        });

        // ===== 滚动渐入 =====
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: .1 });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

        // ===== 导航栏滚动隐藏 =====
        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            const currentScroll = window.pageYOffset;
            if (currentScroll > 120) {
                nav.classList.toggle('hidden-nav', currentScroll > lastScroll && currentScroll > 200);
            } else {
                nav.classList.remove('hidden-nav');
            }
            lastScroll = currentScroll;
        });

        // ===== 平滑导航 =====
        document.querySelectorAll('[data-nav]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = el.getAttribute('data-nav');
                const target = document.getElementById(targetId);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });

        // ===== 初始化 =====
        renderGallery('all');

        // 隐藏加载动画
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400);
        });
        if (document.readyState === 'complete') {
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400);
        }
    </script>
</body>
</html>
